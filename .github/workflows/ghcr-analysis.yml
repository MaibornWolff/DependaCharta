name: GHCR Mirror - Analysis

on:
  workflow_dispatch:

jobs:
  mirror-release:
    name: Mirror release to GHCR
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror release image to GHCR
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          VERSION=$(git tag --sort=-creatordate | head -1 | sed 's/^v//')
          echo "Mirroring version: ${VERSION}"

          docker pull maibornwolff/dependacharta-analysis:latest
          docker tag maibornwolff/dependacharta-analysis:latest ghcr.io/${OWNER}/dependacharta-analysis:latest
          docker tag maibornwolff/dependacharta-analysis:latest ghcr.io/${OWNER}/dependacharta-analysis:${VERSION}
          docker push ghcr.io/${OWNER}/dependacharta-analysis:latest
          docker push ghcr.io/${OWNER}/dependacharta-analysis:${VERSION}
